version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: callmind-postgres
    restart: always
    environment:
      POSTGRES_USER: callmind
      POSTGRES_PASSWORD: callmindpassword
      POSTGRES_DB: callmind_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - callmind-network

  redis:
    image: redis:7-alpine
    container_name: callmind-redis
    restart: always
    command: redis-server --requirepass callmindredispassword
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - callmind-network

volumes:
  postgres_data:
  redis_data:

networks:
  callmind-network:
    driver: bridge
